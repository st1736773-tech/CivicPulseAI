{% block content %}

<div class="chat-container">

<h1>📢 AI Complaint Analyzer</h1>

<form method="POST">

<textarea name="complaint"
placeholder="Write complaint..."
required></textarea>

</form>


{% if result %}

{{result}}
</div>
{% endif %}

</div>

{% endblock %}
