{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <form class="auth-card" method="POST">

        <h1>Create Account</h1>

        <p>Join Jantar Mantar AI Platform</p>

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               id="password"
               name="password"
               placeholder="Password"
               required>

        <div class="strength">
            <div id="strength-bar"></div>
        </div>

        <button type="submit">
            Register
        </button>

        <a href="/login">
            Already have an account?
        </a>

    </form>

</div>

{% endblock %}
